name: Release build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            executable_suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            executable_suffix: '.exe'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux USB build headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config
      - name: Build read-only binaries
        run: cargo build --release --target ${{ matrix.target }} -p reink-cli -p reink-hardware-test -p reink-tui
      - name: Upload release candidates
        uses: actions/upload-artifact@v4
        with:
          name: reink-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/reink${{ matrix.executable_suffix }}
            target/${{ matrix.target }}/release/reink-hardware-test${{ matrix.executable_suffix }}
            target/${{ matrix.target }}/release/reink-tui${{ matrix.executable_suffix }}
          if-no-files-found: error
